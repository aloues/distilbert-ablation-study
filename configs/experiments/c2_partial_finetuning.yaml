experiment_name: "c2_partial_finetuning"
base_model_type: "distilbert"
model_name: "distilbert-base-uncased"
freeze_strategy: "partial"
trainable_layers: [4, 5]      # índices 4 y 5 (capas 5 y 6 en numeración 1-based)
classifier_type: "linear"
hidden_dims: []
dropout: 0.1
learning_rate: 2.0e-5
weight_decay: 0.01
num_epochs: 4
seed: 42
fp16: true
gradient_accumulation_steps: 1
evaluation_strategy: "epoch"
save_strategy: "epoch"
logging_steps: 50
limit_train_samples: null
limit_eval_samples: null
