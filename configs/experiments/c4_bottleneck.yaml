experiment_name: "c4_bottleneck"
base_model_type: "distilbert"
model_name: "distilbert-base-uncased"
freeze_strategy: "frozen_all"
trainable_layers: null
classifier_type: "bottleneck"
hidden_dims: [128, 64]          # 768 → 128 → 64 → num_labels
dropout: 0.3
learning_rate: 2.0e-4
weight_decay: 0.01
num_epochs: 3
seed: 42
fp16: true
gradient_accumulation_steps: 1
evaluation_strategy: "epoch"
save_strategy: "epoch"
logging_steps: 50
limit_train_samples: null
limit_eval_samples: null
